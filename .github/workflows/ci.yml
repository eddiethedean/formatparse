name: CI

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  cargo-audit-nonblocking:
    name: Cargo audit (report only)
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false

      - name: Run cargo audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Test Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      PYO3_USE_ABI3_FORWARD_COMPATIBILITY: ${{ (matrix.python-version == '3.13' || matrix.python-version == '3.14') && '1' || '' }}
      # Load only plugins listed in pyproject addopts; avoids broken global pytest-asyncio.
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu x86-64
          - os: ubuntu-latest
            python-version: "3.8"
            architecture: x86-64
          - os: ubuntu-latest
            python-version: "3.9"
            architecture: x86-64
          - os: ubuntu-latest
            python-version: "3.10"
            architecture: x86-64
          - os: ubuntu-latest
            python-version: "3.11"
            architecture: x86-64
          - os: ubuntu-latest
            python-version: "3.12"
            architecture: x86-64
          - os: ubuntu-latest
            python-version: "3.13"
            architecture: x86-64
          - os: ubuntu-latest
            python-version: "3.14"
            architecture: x86-64
          # PyPy (CPython ABI via PyO3)
          - os: ubuntu-latest
            python-version: "pypy-3.11"
            architecture: x86-64
          # macOS latest (typically arm64/Apple Silicon)
          - os: macos-latest
            python-version: "3.9"
            architecture: aarch64
          - os: macos-latest
            python-version: "3.10"
            architecture: aarch64
          - os: macos-latest
            python-version: "3.11"
            architecture: aarch64
          - os: macos-latest
            python-version: "3.12"
            architecture: aarch64
          - os: macos-latest
            python-version: "3.13"
            architecture: aarch64
          - os: macos-latest
            python-version: "3.14"
            architecture: aarch64
          # Windows x86-64
          - os: windows-latest
            python-version: "3.9"
            architecture: x86-64
          - os: windows-latest
            python-version: "3.10"
            architecture: x86-64
          - os: windows-latest
            python-version: "3.11"
            architecture: x86-64
          - os: windows-latest
            python-version: "3.12"
            architecture: x86-64
          - os: windows-latest
            python-version: "3.13"
            architecture: x86-64
          - os: windows-latest
            python-version: "3.14"
            architecture: x86-64
          # macOS 15 Intel (x86-64)
          - os: macos-15-intel
            python-version: "3.9"
            architecture: x86-64
          - os: macos-15-intel
            python-version: "3.10"
            architecture: x86-64
          - os: macos-15-intel
            python-version: "3.11"
            architecture: x86-64
          - os: macos-15-intel
            python-version: "3.12"
            architecture: x86-64
          - os: macos-15-intel
            python-version: "3.13"
            architecture: x86-64
          - os: macos-15-intel
            python-version: "3.14"
            architecture: x86-64
          # Windows 11 ARM (aarch64) - Python 3.9 and 3.10 not available for Windows ARM
          - os: windows-11-arm
            python-version: "3.11"
            architecture: aarch64
          - os: windows-11-arm
            python-version: "3.12"
            architecture: aarch64
          - os: windows-11-arm
            python-version: "3.13"
            architecture: aarch64
          - os: windows-11-arm
            python-version: "3.14"
            architecture: aarch64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false

      # Pure Rust: no Python venv required. Fails fast on core compile errors before pip/maturin.
      - name: Compile formatparse-core (all targets, no tests executed)
        shell: bash
        run: cargo build -p formatparse-core --all-targets

      - name: Create virtual environment
        shell: bash
        run: |
          python -m venv .venv
          if [ "${{ matrix.os }}" == "windows-latest" ] || [ "${{ matrix.os }}" == "windows-11-arm" ]; then
            .venv/Scripts/python -m pip install --upgrade pip
            .venv/Scripts/python -m pip install "maturin>=1.13.3,<2.0" pytest
          else
            source .venv/bin/activate
            python -m pip install --upgrade pip
            pip install "maturin>=1.13.3,<2.0" pytest
          fi

      - name: Compile and install native extension (maturin develop, release)
        shell: bash
        run: |
          if [ "${{ matrix.os }}" == "windows-latest" ] || [ "${{ matrix.os }}" == "windows-11-arm" ]; then
            cd formatparse-pyo3 && ../.venv/Scripts/maturin develop --release --features extension-module
          else
            source .venv/bin/activate
            cd formatparse-pyo3 && maturin develop --release --features extension-module
          fi

      # Ubuntu CPython 3.11: finish Rust compiles before pytest so the job groups compile vs test phases.
      - name: Compile Rust workspace (all crates, all targets, debug)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        shell: bash
        run: |
          source .venv/bin/activate
          export PYO3_PYTHON="$(command -v python)"
          cargo build --workspace --all-targets

      - name: Compile formatparse-pyo3 python-tests (no execution)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        shell: bash
        run: |
          source .venv/bin/activate
          export PYO3_PYTHON="$(command -v python)"
          cargo test -p formatparse-pyo3 --features python-tests --no-run

      - name: Install test dependencies
        shell: bash
        run: |
          if [ "${{ matrix.os }}" == "windows-latest" ] || [ "${{ matrix.os }}" == "windows-11-arm" ]; then
            .venv/Scripts/python -m pip install hypothesis pytest-cov pytest-benchmark pytest-xdist pympler memory_profiler
          else
            source .venv/bin/activate
            pip install hypothesis pytest-cov pytest-benchmark pytest-xdist pympler memory_profiler
          fi

      # Rust test execution (after all Rust compiles above; before Python pytest).
      - name: Run cargo tests (formatparse-core only)
        if: matrix.os != 'ubuntu-latest' || matrix.python-version != '3.11'
        shell: bash
        run: cargo test -p formatparse-core

      - name: Run cargo tests (full workspace)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        shell: bash
        run: |
          source .venv/bin/activate
          export PYO3_PYTHON="$(command -v python)"
          cargo test --workspace

      - name: Run formatparse-pyo3 python-tests (execute only)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        shell: bash
        run: |
          source .venv/bin/activate
          export PYO3_PYTHON="$(command -v python)"
          cargo test -p formatparse-pyo3 --features python-tests

      - name: Execute pytest suite
        shell: bash
        run: |
          if [ "${{ matrix.os }}" == "windows-latest" ] || [ "${{ matrix.os }}" == "windows-11-arm" ]; then
            .venv/Scripts/python -m pytest tests/ -v
          else
            source .venv/bin/activate
            python -m pytest tests/ -v
          fi

      - name: Execute pytest (security)
        shell: bash
        run: |
          if [ "${{ matrix.os }}" == "windows-latest" ] || [ "${{ matrix.os }}" == "windows-11-arm" ]; then
            .venv/Scripts/python -m pytest tests/test_security.py -v
          else
            source .venv/bin/activate
            python -m pytest tests/test_security.py -v
          fi

      - name: Execute pytest with coverage (Python 3.11, Ubuntu only)
        if: matrix.python-version == '3.11' && matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          source .venv/bin/activate
          python -m pytest tests/ --cov=formatparse --cov-report=term --cov-report=html --cov-report=xml

      - name: Upload coverage reports
        if: matrix.python-version == '3.11' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          verbose: true

  docs:
    name: Documentation (Sphinx)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install documentation dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r docs/requirements.txt

      - name: Build HTML (warnings are errors)
        run: python -m sphinx -W -b html docs docs/_build/html

      - name: Link check
        run: python -m sphinx -b linkcheck docs docs/_build/linkcheck

name: CI

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  cargo-audit-nonblocking:
    name: Cargo audit (report only)
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false

      - name: Run cargo audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  rust-core-linux:
    name: Rust · formatparse-core (Linux compile + test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          shared-key: rust-core-linux

      - name: Compile formatparse-core (all targets, no tests executed)
        run: cargo build -p formatparse-core --all-targets

      - name: Run formatparse-core tests
        run: cargo test -p formatparse-core

  # All matrix cells must succeed before any `integration` job runs (needs: python-build).
  python-build:
    name: Python build · ${{ matrix.python-version }} · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      PYO3_USE_ABI3_FORWARD_COMPATIBILITY: ${{ (matrix.python-version == '3.13' || matrix.python-version == '3.14') && '1' || '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.8"
            architecture: x86-64
          - os: ubuntu-latest
            python-version: "3.9"
            architecture: x86-64
          - os: ubuntu-latest
            python-version: "3.10"
            architecture: x86-64
          - os: ubuntu-latest
            python-version: "3.11"
            architecture: x86-64
          - os: ubuntu-latest
            python-version: "3.12"
            architecture: x86-64
          - os: ubuntu-latest
            python-version: "3.13"
            architecture: x86-64
          - os: ubuntu-latest
            python-version: "3.14"
            architecture: x86-64
          - os: ubuntu-latest
            python-version: "pypy-3.11"
            architecture: x86-64
          - os: macos-latest
            python-version: "3.9"
            architecture: aarch64
          - os: macos-latest
            python-version: "3.10"
            architecture: aarch64
          - os: macos-latest
            python-version: "3.11"
            architecture: aarch64
          - os: macos-latest
            python-version: "3.12"
            architecture: aarch64
          - os: macos-latest
            python-version: "3.13"
            architecture: aarch64
          - os: macos-latest
            python-version: "3.14"
            architecture: aarch64
          - os: windows-latest
            python-version: "3.9"
            architecture: x86-64
          - os: windows-latest
            python-version: "3.10"
            architecture: x86-64
          - os: windows-latest
            python-version: "3.11"
            architecture: x86-64
          - os: windows-latest
            python-version: "3.12"
            architecture: x86-64
          - os: windows-latest
            python-version: "3.13"
            architecture: x86-64
          - os: windows-latest
            python-version: "3.14"
            architecture: x86-64
          - os: macos-15-intel
            python-version: "3.9"
            architecture: x86-64
          - os: macos-15-intel
            python-version: "3.10"
            architecture: x86-64
          - os: macos-15-intel
            python-version: "3.11"
            architecture: x86-64
          - os: macos-15-intel
            python-version: "3.12"
            architecture: x86-64
          - os: macos-15-intel
            python-version: "3.13"
            architecture: x86-64
          - os: macos-15-intel
            python-version: "3.14"
            architecture: x86-64
          - os: windows-11-arm
            python-version: "3.11"
            architecture: aarch64
          - os: windows-11-arm
            python-version: "3.12"
            architecture: aarch64
          - os: windows-11-arm
            python-version: "3.13"
            architecture: aarch64
          - os: windows-11-arm
            python-version: "3.14"
            architecture: aarch64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          shared-key: py-build-${{ matrix.os }}-${{ matrix.python-version }}

      - name: Python · build — venv and maturin CLI only
        shell: bash
        run: |
          python -m venv .venv
          if [ "${{ matrix.os }}" == "windows-latest" ] || [ "${{ matrix.os }}" == "windows-11-arm" ]; then
            .venv/Scripts/python -m pip install --upgrade pip
            .venv/Scripts/python -m pip install "maturin>=1.13.3,<2.0"
          else
            source .venv/bin/activate
            python -m pip install --upgrade pip
            pip install "maturin>=1.13.3,<2.0"
          fi

      - name: Python · build — compile wheel (maturin build, release)
        shell: bash
        run: |
          if [ "${{ matrix.os }}" == "windows-latest" ] || [ "${{ matrix.os }}" == "windows-11-arm" ]; then
            cd formatparse-pyo3 && ../.venv/Scripts/maturin build --out ../dist --release --features extension-module
          else
            source .venv/bin/activate
            cd formatparse-pyo3 && maturin build --out ../dist --release --features extension-module
          fi

      - name: Python · build — verify wheel installs and imports
        shell: bash
        run: |
          if [ "${{ matrix.os }}" == "windows-latest" ] || [ "${{ matrix.os }}" == "windows-11-arm" ]; then
            .venv/Scripts/python -m pip install --force-reinstall dist/formatparse*.whl
            .venv/Scripts/python -c "import formatparse; import _formatparse; print('ok', getattr(formatparse, '__version__', ''))"
          else
            source .venv/bin/activate
            pip install --force-reinstall dist/formatparse*.whl
            python -c "import formatparse; import _formatparse; print('ok', getattr(formatparse, '__version__', ''))"
          fi

      - name: Upload wheel artifact for integration tests
        uses: actions/upload-artifact@v4
        with:
          name: formatparse-wheel-${{ matrix.os }}-${{ matrix.python-version }}
          path: dist/
          if-no-files-found: error

  integration:
    name: Integration · ${{ matrix.python-version }} · ${{ matrix.os }}
    needs: [python-build]
    runs-on: ${{ matrix.os }}
    env:
      PYO3_USE_ABI3_FORWARD_COMPATIBILITY: ${{ (matrix.python-version == '3.13' || matrix.python-version == '3.14') && '1' || '' }}
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.8"
            architecture: x86-64
          - os: ubuntu-latest
            python-version: "3.9"
            architecture: x86-64
          - os: ubuntu-latest
            python-version: "3.10"
            architecture: x86-64
          - os: ubuntu-latest
            python-version: "3.11"
            architecture: x86-64
          - os: ubuntu-latest
            python-version: "3.12"
            architecture: x86-64
          - os: ubuntu-latest
            python-version: "3.13"
            architecture: x86-64
          - os: ubuntu-latest
            python-version: "3.14"
            architecture: x86-64
          - os: ubuntu-latest
            python-version: "pypy-3.11"
            architecture: x86-64
          - os: macos-latest
            python-version: "3.9"
            architecture: aarch64
          - os: macos-latest
            python-version: "3.10"
            architecture: aarch64
          - os: macos-latest
            python-version: "3.11"
            architecture: aarch64
          - os: macos-latest
            python-version: "3.12"
            architecture: aarch64
          - os: macos-latest
            python-version: "3.13"
            architecture: aarch64
          - os: macos-latest
            python-version: "3.14"
            architecture: aarch64
          - os: windows-latest
            python-version: "3.9"
            architecture: x86-64
          - os: windows-latest
            python-version: "3.10"
            architecture: x86-64
          - os: windows-latest
            python-version: "3.11"
            architecture: x86-64
          - os: windows-latest
            python-version: "3.12"
            architecture: x86-64
          - os: windows-latest
            python-version: "3.13"
            architecture: x86-64
          - os: windows-latest
            python-version: "3.14"
            architecture: x86-64
          - os: macos-15-intel
            python-version: "3.9"
            architecture: x86-64
          - os: macos-15-intel
            python-version: "3.10"
            architecture: x86-64
          - os: macos-15-intel
            python-version: "3.11"
            architecture: x86-64
          - os: macos-15-intel
            python-version: "3.12"
            architecture: x86-64
          - os: macos-15-intel
            python-version: "3.13"
            architecture: x86-64
          - os: macos-15-intel
            python-version: "3.14"
            architecture: x86-64
          - os: windows-11-arm
            python-version: "3.11"
            architecture: aarch64
          - os: windows-11-arm
            python-version: "3.12"
            architecture: aarch64
          - os: windows-11-arm
            python-version: "3.13"
            architecture: aarch64
          - os: windows-11-arm
            python-version: "3.14"
            architecture: aarch64

    steps:
      - name: Report job phases (Summary tab)
        shell: bash
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'EOF'
          ## Phases in this integration job

          | Phase | What runs |
          |-------|-----------|
          | **0 · Prerequisite** | All **Python build** matrix jobs succeeded (`needs: python-build`); this job downloads the matching wheel artifact. |
          | **1 · Rust core compile** | `cargo build -p formatparse-core --all-targets` |
          | **2 · Python runtime from artifact** | venv + `pip install` downloaded wheel + import check |
          | **3 · Extra Rust compile (Ubuntu CPython 3.11 only)** | `cargo build --workspace --all-targets` and `cargo test -p formatparse-pyo3 --features python-tests --no-run` |
          | **4 · Rust tests** | `cargo test` (full workspace on Ubuntu 3.11; core-only elsewhere) + `python-tests` execute on Ubuntu 3.11 |
          | **5 · Python tests** | install pytest stack, then `pytest` |

          Parallel: **Rust · formatparse-core (Linux)** job; **Python build** job group (wheels) must be green before this job starts.
          EOF

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false

      - name: Compile formatparse-core (all targets, no tests executed)
        shell: bash
        run: cargo build -p formatparse-core --all-targets

      - name: Download wheel from python-build job
        uses: actions/download-artifact@v4
        with:
          name: formatparse-wheel-${{ matrix.os }}-${{ matrix.python-version }}
          path: wheel-dist

      - name: Python · venv and install wheel from artifact
        shell: bash
        run: |
          python -m venv .venv
          if [ "${{ matrix.os }}" == "windows-latest" ] || [ "${{ matrix.os }}" == "windows-11-arm" ]; then
            .venv/Scripts/python -m pip install --upgrade pip
            .venv/Scripts/python -m pip install --force-reinstall wheel-dist/formatparse*.whl
            .venv/Scripts/python -c "import formatparse; import _formatparse; print('formatparse', getattr(formatparse, '__version__', ''))"
          else
            source .venv/bin/activate
            python -m pip install --upgrade pip
            pip install --force-reinstall wheel-dist/formatparse*.whl
            python -c "import formatparse; import _formatparse; print('formatparse', getattr(formatparse, '__version__', ''))"
          fi

      - name: Compile Rust workspace (all crates, all targets, debug)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        shell: bash
        run: |
          source .venv/bin/activate
          export PYO3_PYTHON="$(command -v python)"
          cargo build --workspace --all-targets

      - name: Compile formatparse-pyo3 python-tests (no execution)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        shell: bash
        run: |
          source .venv/bin/activate
          export PYO3_PYTHON="$(command -v python)"
          cargo test -p formatparse-pyo3 --features python-tests --no-run

      - name: Run cargo tests (formatparse-core only)
        if: matrix.os != 'ubuntu-latest' || matrix.python-version != '3.11'
        shell: bash
        run: cargo test -p formatparse-core

      - name: Run cargo tests (full workspace)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        shell: bash
        run: |
          source .venv/bin/activate
          export PYO3_PYTHON="$(command -v python)"
          cargo test --workspace

      - name: Run formatparse-pyo3 python-tests (execute only)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        shell: bash
        run: |
          source .venv/bin/activate
          export PYO3_PYTHON="$(command -v python)"
          cargo test -p formatparse-pyo3 --features python-tests

      - name: Python · test — install pytest and test dependencies
        shell: bash
        run: |
          if [ "${{ matrix.os }}" == "windows-latest" ] || [ "${{ matrix.os }}" == "windows-11-arm" ]; then
            .venv/Scripts/python -m pip install pytest hypothesis pytest-cov pytest-benchmark pytest-xdist pympler memory_profiler
          else
            source .venv/bin/activate
            pip install pytest hypothesis pytest-cov pytest-benchmark pytest-xdist pympler memory_profiler
          fi

      - name: Python · test — pytest suite
        shell: bash
        run: |
          if [ "${{ matrix.os }}" == "windows-latest" ] || [ "${{ matrix.os }}" == "windows-11-arm" ]; then
            .venv/Scripts/python -m pytest tests/ -v
          else
            source .venv/bin/activate
            python -m pytest tests/ -v
          fi

      - name: Python · test — pytest (security)
        shell: bash
        run: |
          if [ "${{ matrix.os }}" == "windows-latest" ] || [ "${{ matrix.os }}" == "windows-11-arm" ]; then
            .venv/Scripts/python -m pytest tests/test_security.py -v
          else
            source .venv/bin/activate
            python -m pytest tests/test_security.py -v
          fi

      - name: Python · test — pytest with coverage (Python 3.11, Ubuntu only)
        if: matrix.python-version == '3.11' && matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          source .venv/bin/activate
          python -m pytest tests/ --cov=formatparse --cov-report=term --cov-report=html --cov-report=xml

      - name: Python · test — upload coverage reports
        if: matrix.python-version == '3.11' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          verbose: true

  docs:
    name: Documentation (Sphinx)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install documentation dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r docs/requirements.txt

      - name: Build HTML (warnings are errors)
        run: python -m sphinx -W -b html docs docs/_build/html

      - name: Link check
        run: python -m sphinx -b linkcheck docs docs/_build/linkcheck
